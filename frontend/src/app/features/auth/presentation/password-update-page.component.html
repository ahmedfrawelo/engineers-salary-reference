<section class="password-reset-shell" role="region" aria-label="Forced password change">
  <div class="password-reset-card">
    <div class="eyebrow">Security checkpoint</div>
    <h1>Change your password</h1>
    <p class="intro">
      This account is using a temporary administrator password. Set a private password before
      opening the portal.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit($event)" novalidate>
      <label class="field">
        <span>Temporary password</span>
        <input
          type="password"
          formControlName="currentPassword"
          autocomplete="current-password"
          placeholder="Enter the password you just used"
        />
      </label>

      <label class="field">
        <span>New password</span>
        <input
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="Create a strong new password"
        />
      </label>

      <label class="field">
        <span>Confirm new password</span>
        <input
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Repeat the new password"
        />
      </label>

      <div class="rules">
        Minimum 10 characters, with uppercase, lowercase, a number, and a special character.
      </div>

      <button class="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Updating...' : 'Update password' }}
      </button>

      <button class="secondary" type="button" (click)="leave()" [disabled]="loading()">
        Sign out
      </button>
    </form>
  </div>
</section>
