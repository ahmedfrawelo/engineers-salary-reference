<section class="recovery-shell" role="region" aria-label="Reset password">
  <div class="recovery-card">
    <div class="eyebrow">Security checkpoint</div>
    <h1>Choose a new password</h1>
    <p class="intro">
      Set a fresh password for <strong>{{ email() || 'your account' }}</strong> and then sign in
      again.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit($event)" novalidate>
      <label class="field">
        <span>New password</span>
        <input
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="Create a strong password"
        />
      </label>

      <label class="field">
        <span>Confirm new password</span>
        <input
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Repeat the new password"
        />
      </label>

      <div class="rules">
        Minimum 10 characters, with uppercase, lowercase, a number, and a special character.
      </div>

      <div class="actions">
        <button class="primary" type="submit" [disabled]="loading()">
          {{ loading() ? 'Updating...' : 'Reset password' }}
        </button>

        <a class="secondary link-button" routerLink="/login">Back to sign in</a>
      </div>
    </form>
  </div>
</section>
