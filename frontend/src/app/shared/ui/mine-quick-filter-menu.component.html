<div class="mine-quick-filter" [class.open]="open">
  <button
    class="tool-avatar tool-avatar-filter pd-toolbar-control pd-motion pd-motion--chrome"
    type="button"
    [class.active]="active"
    [class.open]="open"
    [attr.aria-label]="tooltip"
    [attr.aria-pressed]="active"
    [attr.data-tooltip]="tooltip"
    (pointerdown)="onTriggerPointerDown($event)"
    (click)="onTriggerClick($event)"
  >
    <span class="tool-avatar-filter__ring" aria-hidden="true">
      <span class="tool-avatar-filter__core">{{ initials }}</span>
    </span>
  </button>

  @if (showClear) {
    <button
      class="tool-avatar-filter__badge pd-toolbar-control pd-motion pd-motion--chrome"
      type="button"
      [attr.aria-label]="clearAriaLabel"
      (click)="onClearClick($event)"
    >
      <i appIcon="x-lg" aria-hidden="true"></i>
    </button>
  }

  @if (open) {
    <section
      class="mine-quick-panel"
      role="dialog"
      [attr.aria-label]="panelAriaLabel"
      (click)="$event.stopPropagation()"
    >
      <p class="mine-quick-title">{{ title }}</p>
      <div class="mine-quick-options">
        @for (option of options; track option.key; let index = $index) {
          <button
            class="mine-quick-option pd-motion pd-motion--list"
            type="button"
            [class.active]="option.active"
            [style.--mine-option-index]="index"
            (click)="onOptionToggle(option.key)"
          >
            <span class="mine-quick-option-text">{{ option.label }}</span>
            <span class="mine-quick-switch" [class.on]="option.active" aria-hidden="true"></span>
          </button>
        }
      </div>
    </section>
  }
</div>
